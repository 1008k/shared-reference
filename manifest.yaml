version: 2
name: agent-rules
source_repo: https://github.com/1008k/agent-rules.git
managed_header: agent-rules

sync_targets:
  - source: shared-index.yaml
    destination: .shared/shared-index.yaml
    type: shared-index
    overwrite: true
    description: Shared vendor index for project policy hubs.
  - source: docs/
    destination: .shared/docs/
    type: shared-docs
    overwrite: true
    description: Shared agent-facing documents, including the shared index, baseline rules, and integration memos.
  - source: .agents/skills/
    destination: .shared/skills/
    type: shared-skills
    overwrite: true
    description: Shared Codex-compatible skills and their references.

local_extension_policy:
  keep_unmanaged_files: true
  shared_name_conflicts: stop
  project_specific_docs: docs/integrations/
  project_specific_skills: .agents/skills/
  project_specific_rule_overrides: docs/rules-*.md
